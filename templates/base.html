<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sistema de Horarios{% endblock %}</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .table thead th { background-color: #0d6efd; color: #fff; }
    .badge-dia { font-size: .8rem; }
    .card-facultad { border-left: 4px solid #0d6efd; }
    footer { font-size: .85rem; }
  </style>
</head>
<body>

<!-- Barra de navegación -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'core:horarios' %}">
      <i class="bi bi-calendar-week me-2"></i>Horarios Universitarios
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'core:horarios' %}">
            <i class="bi bi-table me-1"></i>Horarios
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'core:facultades' %}">
            <i class="bi bi-building me-1"></i>Facultades
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'core:automatricula' %}">
            <i class="bi bi-robot me-1"></i>Automatrícula IA
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/">
            <i class="bi bi-gear me-1"></i>Admin
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container pb-5">
  {% block content %}{% endblock %}
</main>

<footer class="bg-white border-top text-center text-muted py-3 mt-5">
  Sistema de Gestión de Horarios Universitarios &mdash; Django 6
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmLXi2JgGRBRGVQyMkXMwl5HWaB"
        crossorigin="anonymous"></script>
</body>
</html>
